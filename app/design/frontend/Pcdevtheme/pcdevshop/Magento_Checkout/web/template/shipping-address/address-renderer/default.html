<div class="shipping-address-item" css="'selected-item' : isSelected() , 'not-selected-item':!isSelected()">
    <text args="address().prefix"></text> 
	<div class="cname"><text args="address().firstname"></text> <text args="address().middlename"></text>
    <text args="address().lastname"></text></div>
	<div class="caddress"><text args="address().suffix"></text><br/>
    <text args="_.values(address().street).join(', ')"></text><br/>
    <text args="address().city "></text>, <span class="shipregionid" text="address().region"></span></div>
	<div class="cpostcode"><text args="address().postcode"></text><br/>
    <text args="getCountryName(address().countryId)"></text><br/>
    <a if="address().telephone" attr="'href': 'tel:' + address().telephone" text="address().telephone"></a><br/></div>
	
	<div class="cextra">
    <each args="data: address().customAttributes, as: 'element'">
		<div class="cextrafield" >
        <text args="$parent.getCustomAttributeLabel(element)"></text>
        <br/>
		</div>
    </each>
	</div>

    <button type="button"
            class="action edit-address-link"
            click="editAddress">
        <span translate="'Edit'"></span>
    </button>
    <!-- ko if: (!isSelected()) -->
    <button type="button" click="selectAddress" class="action action-select-shipping-item">
        <span translate="'Ship Here'"></span>
    </button>
    <!-- /ko -->
</div>
